name: Lighthouse

on:
  schedule:
    - cron: '25 * * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install root deps
        run: npm ci

      - name: Install frontend deps
        run: npm ci
        working-directory: frontend

      - name: Build backend
        run: mvn -B package -DskipTests
        working-directory: backend

      - name: Start backend
        run: |
          java -jar backend/target/*.jar &
          timeout 60 sh -c 'until curl -s http://localhost:8080 > /dev/null 2>&1; do sleep 2; done'
          echo "Backend is ready"

      - name: Start frontend
        run: |
          npx vite --port 5173 &
          timeout 30 sh -c 'until curl -s http://localhost:5173 > /dev/null 2>&1; do sleep 2; done'
          echo "Frontend is ready"
        working-directory: frontend

      - name: Run Lighthouse audit
        run: npm run lighthouse
        env:
          LH_URL: http://localhost:5173

      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-report
          path: lighthouse-reports/

      - name: Post summary
        if: always()
        run: cat lighthouse-summary.md >> $GITHUB_STEP_SUMMARY
